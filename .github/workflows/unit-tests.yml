name: Unit Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ZEPHYR_SDK_VERSION: 0.17.0
  ZEPHYR_SDK_INSTALL_DIR: /opt/zephyr-sdk
  NRF_CONNECT_SDK_VERSION: 3.2.3

jobs:
  unit-tests:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt upgrade -y
          sudo apt install -y --no-install-recommends git cmake ninja-build gperf \
            ccache dfu-util device-tree-compiler wget python3-dev python3-venv python3-tk \
            xz-utils file make gcc gcc-multilib g++-multilib libsdl2-dev libmagic1
          cmake --version
          python3 --version
          dtc --version

      - name: Get Zephyr and install Python dependencies
        run: |
          python3 -m venv ~/zephyrproject/.venv
          source ~/zephyrproject/.venv/bin/activate
          pip install west
          west init ~/zephyrproject
          cd ~/zephyrproject
          west update
          west zephyr-export
          west packages pip --install

      - name: Install the Zephyr SDK
        run: |
          cd ~/zephyrproject/zephyr
          source ~/zephyrproject/.venv/bin/activate
          west sdk install -t x86_64-zephyr-elf

      - name: Run unit tests on native_sim
        run: |
          source ~/zephyrproject/.venv/bin/activate
          source ~/zephyrproject/zephyr/zephyr-env.sh
          west twister \
            -T ${{ github.workspace }}/app/tests/unit \
            --platform native_sim \
            --inline-logs \
            -v

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: twister-results
          path: twister-out/
          retention-days: 7

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: twister-out/**/twister.xml
