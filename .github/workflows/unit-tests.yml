name: Unit Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ZEPHYR_SDK_VERSION: 0.17.0
  ZEPHYR_SDK_INSTALL_DIR: /opt/zephyr-sdk
  NRF_CONNECT_SDK_VERSION: 3.2.3

jobs:
  unit-tests:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build python3-pip python3-venv \
            gcc g++ git wget xz-utils file

      - name: Install west
        run: |
          pip3 install west

      - name: Cache west modules
        id: cache-west
        uses: actions/cache@v4
        with:
          path: nrfconnect
          key: west-ncs-v${NRF_CONNECT_SDK_VERSION}-${{ hashFiles('west.yml') }}
          restore-keys: |
            west-ncs-v${NRF_CONNECT_SDK_VERSION}-

      - name: Initialize west workspace
        if: steps.cache-west.outputs.cache-hit != 'true'
        run: |
          west init -m https://github.com/nrfconnect/sdk-nrf \
            --mr v${NRF_CONNECT_SDK_VERSION} nrfconnect
          cd nrfconnect
          west update
          west zephyr-export

      - name: Install Python requirements
        run: |
          pip3 install -r nrfconnect/nrf/scripts/requirements.txt

      - name: Restore Zephyr SDK cache
        id: cache-sdk
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.ZEPHYR_SDK_INSTALL_DIR }}
          key: zephyr-sdk-${{ env.ZEPHYR_SDK_VERSION }}-x86_64

      - name: Download and install Zephyr SDK
        if: steps.cache-west.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v${ZEPHYR_SDK_VERSION}/zephyr-sdk-${ZEPHYR_SDK_VERSION}_linux-x86_64_minimal.tar.xz
          sudo mkdir -p ${ZEPHYR_SDK_INSTALL_DIR}
          tar -xf zephyr-sdk-${ZEPHYR_SDK_VERSION}_linux-x86_64_minimal.tar.xz \
            --strip-components=1 \
            -C ${ZEPHYR_SDK_INSTALL_DIR}
          ${ZEPHYR_SDK_INSTALL_DIR}/setup.sh -t x86_64-zephyr-elf -h -c

      - name: Save Zephyr SDK cache
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.ZEPHYR_SDK_INSTALL_DIR }}
          key: zephyr-sdk-${{ env.ZEPHYR_SDK_VERSION }}-x86_64

      - name: Debug environment
        working-directory: nrfconnect
        run: |
          echo "ZEPHYR_BASE=$ZEPHYR_BASE"
          west help | head -5          # shows if west twister is known as command
          west topdir                  # shows if .west/ is found
        env:
          ZEPHYR_BASE: ${{ github.workspace }}/nrfconnect/zephyr

      - name: Run unit tests on native_sim
        env:
          ZEPHYR_TOOLCHAIN_VARIANT: zephyr
        working-directory: nrfconnect
        run: |
          source zephyr/zephyr-env.sh
          west twister \
            -T ${{ github.workspace }}/app/tests/unit \
            --platform native_sim \
            --inline-logs \
            -v

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: twister-results
          path: nrfconnect/twister-out
          retention-days: 7

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: nrfconnect/twister-out/**/twister.xml
