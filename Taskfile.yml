# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

tasks:
  lint:
    desc: Check code formatting and linting
    cmds:
      - find src include tests -name '*.c' -o -name '*.h' | xargs clang-format --dry-run --Werror

  format:
    desc: Format code using clang-format
    cmds:
      - find src include tests -name '*.c' -o -name '*.h' | xargs clang-format -i

  unit-test:
    desc: Run unit tests
    cmds:
      - west twister -T tests/unit -p native_sim -v --inline-logs